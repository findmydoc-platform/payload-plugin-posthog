
services:

  postgres:
    image: postgres:latest
    container_name: postgres5
    platform: linux/amd64
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: findmydoc-portal-plugin
    volumes:
      - cmsplugin_data:/var/lib/postgresql/data

volumes:
  cmsplugin_data:
